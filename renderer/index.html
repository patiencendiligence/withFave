<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>withFave</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="main-body">
  <div class="main-container">
    <div class="character-display">
      <div class="character-wrapper">
        <div id="character" class="character">😌</div>
        <div id="character-badge" class="character-badge">calm</div>
      </div>
    </div>
    
    <div class="cpu-row">
      <span class="cpu-label">CPU</span>
      <div class="cpu-bar-container">
        <div id="cpu-bar" class="cpu-bar" style="width: 0%"></div>
      </div>
      <span id="cpu-value" class="cpu-value">0%</span>
    </div>
    <span id="emotion-label" style="display:none;">calm</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
