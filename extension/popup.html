<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>withFave</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Nav Icons (top-right) -->
    <nav class="nav">
      <button class="nav-btn active" data-tab="main">🏠</button>
      <button class="nav-btn" data-tab="settings">⚙️</button>
      <button class="nav-btn" data-tab="info">ℹ️</button>
    </nav>

    <!-- Main -->
    <div id="tab-main" class="tab active">
      <div class="char-wrap" id="charWrap">
        <img id="charImg" src="" draggable="false">
        <span class="emotion-label" id="emotionLabel">NORMAL</span>
      </div>
    </div>

    <!-- Settings -->
    <div id="tab-settings" class="tab">
      <div id="charGrid" class="grid"></div>
      <button id="btnAdd" class="add-btn">+</button>
      
      <div id="modal" class="modal hidden">
        <div class="modal-box">
          <input type="text" id="charName" placeholder="Name">
          <div class="img-grid">
            <label data-i="0"><input type="file" id="img-0" accept="image/*" hidden>😌<img class="pv hidden"></label>
            <label data-i="1"><input type="file" id="img-1" accept="image/*" hidden>🙂<img class="pv hidden"></label>
            <label data-i="2"><input type="file" id="img-2" accept="image/*" hidden>😄<img class="pv hidden"></label>
            <label data-i="3"><input type="file" id="img-3" accept="image/*" hidden>😤<img class="pv hidden"></label>
          </div>
          <div class="modal-btns">
            <button id="mCancel">✕</button>
            <button id="mSave">✓</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Info -->
    <div id="tab-info" class="tab">
      <div class="info">
        <p>Tabs: <b id="tabCount">0</b></p>
        <p class="small">😌≤5 🙂≤15 😄≤30 😤30+</p>
        <a href="https://ko-fi.com/H2H61W7DT8" target="_blank">☕ Ko-fi</a>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
